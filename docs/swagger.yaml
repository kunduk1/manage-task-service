components:
  schemas:
    github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody:
      properties:
        error:
          type: string
      type: object
    github_com_kunduk1_manage-task-service_pkg_auth_v1.LoginRequest:
      properties:
        email:
          example: user@example.com
          type: string
        password:
          example: s3cret-pass
          type: string
      type: object
    github_com_kunduk1_manage-task-service_pkg_auth_v1.LoginResponse:
      properties:
        access_token:
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          type: string
        expires_in:
          example: 900
          type: integer
        refresh_token:
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          type: string
        token_type:
          example: Bearer
          type: string
      type: object
    github_com_kunduk1_manage-task-service_pkg_auth_v1.RegisterRequest:
      properties:
        email:
          example: user@example.com
          type: string
        name:
          example: Jane Doe
          type: string
        password:
          example: s3cret-pass
          type: string
      type: object
    github_com_kunduk1_manage-task-service_pkg_auth_v1.RegisterResponse:
      properties:
        email:
          example: user@example.com
          type: string
        id:
          example: 42
          type: integer
        name:
          example: Jane Doe
          type: string
      type: object
  securitySchemes:
    BearerAuth:
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: Auth/tasks/teams API for manage-task-service.
  title: Manage Task Service API
  version: "1.0"
openapi: 3.1.0
paths:
  /login:
    post:
      description: Validates credentials and returns access/refresh tokens.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_auth_v1.LoginRequest'
        description: login payload
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_auth_v1.LoginResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      summary: Log in and obtain tokens
      tags:
      - auth
  /register:
    post:
      description: Creates a user account and returns its public profile.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_auth_v1.RegisterRequest'
        description: registration payload
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_auth_v1.RegisterResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      summary: Register a new user
      tags:
      - auth
servers:
- url: http://localhost:8080/api/v1
