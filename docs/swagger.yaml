externalDocs:
  description: ""
  url: ""
info:
  description: Auth/tasks/teams API for manage-task-service.
  title: Manage Task Service API
  version: "1.0"
openapi: 3.1.0
paths:
  /login:
    post:
      description: Validates credentials and returns access/refresh tokens.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_auth_v1.LoginRequest'
        description: login payload
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_auth_v1.LoginResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      summary: Log in and obtain tokens
      tags:
      - auth
  /register:
    post:
      description: Creates a user account and returns its public profile.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_auth_v1.RegisterRequest'
        description: registration payload
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_auth_v1.RegisterResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      summary: Register a new user
      tags:
      - auth
  /tasks:
    get:
      description: Lists a team's tasks with optional status/assignee filters and
        pagination. Caller must be a team member.
      parameters:
      - description: team id
        in: query
        name: team_id
        required: true
        schema:
          type: integer
      - description: filter by status (todo, in_progress, done)
        in: query
        name: status
        schema:
          type: string
      - description: filter by assignee id
        in: query
        name: assignee_id
        schema:
          type: integer
      - description: page size (default 20, max 100)
        in: query
        name: limit
        schema:
          type: integer
      - description: page offset (default 0)
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_task_v1.ListTasksResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: List tasks
      tags:
      - tasks
    post:
      description: Creates a task in a team. Only a member of the team may create.
        Status defaults to todo.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_task_v1.CreateTaskRequest'
        description: task payload
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_task_v1.TaskResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a task
      tags:
      - tasks
  /tasks/{id}:
    put:
      description: Partially updates a task (only provided fields change; assignee_id=0
        unassigns). Allowed for the creator, current assignee, or team owner/admin.
        Records field-level history.
      parameters:
      - description: task id
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_task_v1.UpdateTaskRequest'
        description: fields to update
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_task_v1.TaskResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Update a task
      tags:
      - tasks
  /tasks/{id}/history:
    get:
      description: Returns the task's field-level change history, newest first. Caller
        must be a team member.
      parameters:
      - description: task id
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_task_v1.TaskHistoryResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Task change history
      tags:
      - tasks
  /tasks/misassigned:
    get:
      description: 'Integrity check: returns tasks whose assignee is not a member
        of the task''s team.'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_task_v1.MisassignedTasksResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Misassigned tasks
      tags:
      - tasks
  /teams:
    get:
      description: Returns the teams the authenticated caller is a member of.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_team_v1.ListTeamsResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: List my teams
      tags:
      - teams
    post:
      description: Creates a team; the authenticated caller becomes its owner.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_team_v1.CreateTeamRequest'
        description: team payload
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_team_v1.TeamResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Create a team
      tags:
      - teams
  /teams/{id}/invite:
    post:
      description: Adds a user to the team. Only owner or admin may invite. Role defaults
        to member.
      parameters:
      - description: team id
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_team_v1.InviteRequest'
        description: invite payload
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_team_v1.InviteResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Invite a user to a team
      tags:
      - teams
  /teams/stats:
    get:
      description: Returns, for every team, its name, member count and number of tasks
        moved to done in the last 7 days.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_team_v1.TeamStatsResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Team stats
      tags:
      - teams
  /teams/top-creators:
    get:
      description: Returns the top-3 task creators in each team over the given period.
        Defaults to the last 30 days.
      parameters:
      - description: period start, RFC3339 (default now-30d)
        in: query
        name: from
        schema:
          type: string
      - description: period end, RFC3339 (default now)
        in: query
        name: to
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_pkg_team_v1.TopCreatorsResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/github_com_kunduk1_manage-task-service_internal_transport_response.ErrorBody'
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Top task creators per team
      tags:
      - teams
servers:
- url: http://localhost:8080/api/v1
