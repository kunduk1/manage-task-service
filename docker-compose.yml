services:
  app:
    build:
      context: .
    container_name: manage-task-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      HTTP_PORT: "8080"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_DATABASE: manage_task
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-me
    ports:
      - "8080:8080"

  mysql:
    image: mysql:8.4
    container_name: manage-task-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: manage_task
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: manage-task-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
